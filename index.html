<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diego Cubillos — Full Stack Developer</title>
  <meta name="description" content="Diego Armando Cubillos Clavijo — Desarrollador Full Stack. TypeScript, React, Node.js, NestJS, Flutter." />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />
  <meta name="theme-color" content="#16181d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== Background layers ===== -->
  <div class="bg" aria-hidden="true">
    <div class="grid"></div>
    <div class="blobs">
      <span class="blob b1"></span>
      <span class="blob b2"></span>
      <span class="blob b3"></span>
    </div>
    <div class="initials">DC<span class="dot">.</span></div>
    <div class="float-ring"></div>
    <div class="cursor-glow"></div>
  </div>

  <!-- ===== Header ===== -->
  <header class="nav">
    <a class="logo" href="/" data-view="home" aria-label="Inicio">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <line x1="12" y1="3" x2="12" y2="21"></line>
        <line x1="3.2" y1="7.5" x2="20.8" y2="16.5"></line>
        <line x1="20.8" y1="7.5" x2="3.2" y2="16.5"></line>
      </svg>
    </a>
    <nav class="nav-links">
      <a href="/about" data-view="about" data-i18n="nav.about">Sobre mí</a>
      <a href="/projects" data-view="projects" data-i18n="nav.projects">Proyectos</a>
      <a href="/contact" data-view="contact" data-i18n="nav.contact">Contacto</a>
    </nav>
    <div class="controls">
      <button class="lang-btn" id="langBtn" aria-label="Cambiar idioma">
        <span class="lang-on">ES</span><span class="sep">/</span><span class="lang-off">EN</span>
      </button>
      <button class="theme-btn" id="themeBtn" aria-label="Cambiar tema">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"></circle>
          <path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor"></path>
        </svg>
      </button>
      <button class="menu-btn" id="menuBtn" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== Views ===== -->
  <main>
    <!-- HOME -->
    <section class="view view-home is-active" id="home">
      <div class="home-inner">
        <div class="name-stage">
          <span class="ghost g-a" aria-hidden="true"></span>
          <span class="ghost g-b" aria-hidden="true"></span>
          <h1 class="hero-name" id="heroName"></h1>
        </div>
        <div class="hero-body">
          <p id="heroP1"></p>
          <p id="heroP2"></p>
        </div>
        <a href="/about" class="see-more" data-view="about">
          <span data-i18n="home.seeMore">Ver más sobre mí</span>
          <svg viewBox="0 0 40 12" width="44" height="13" fill="none" stroke="currentColor" stroke-width="1.4">
            <line x1="0" y1="6" x2="38" y2="6"></line>
            <polyline points="32,1 38,6 32,11"></polyline>
          </svg>
        </a>
        <div class="socials" id="homeSocials"></div>
      </div>
    </section>

    <!-- ABOUT -->
    <section class="view view-scroll" id="about">
      <div class="scroll-inner">
        <h2 class="big-title" data-i18n="about.title">Sobre mí.</h2>
        <div class="about-rows" id="aboutRows"></div>
        <div class="about-foot">
          <div class="foot-col">
            <span class="foot-label" data-i18n="about.eduLabel">Educación</span>
            <p class="foot-main" data-i18n="about.edu">Ingeniería de Sistemas</p>
            <p class="foot-sub">Universidad Santo Tomás · Tunja · 2023—<span data-i18n="about.present">Presente</span></p>
          </div>
          <div class="foot-col">
            <span class="foot-label" data-i18n="about.certLabel">Certificación</span>
            <p class="foot-main">Scrum Fundamentals Certified</p>
            <p class="foot-sub">SCRUMstudy · 2025</p>
          </div>
          <div class="foot-col">
            <span class="foot-label" data-i18n="about.stackLabel">Stack</span>
            <div class="stack-tags" id="stackTags"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- PROJECTS -->
    <section class="view view-scroll" id="projects">
      <div class="scroll-inner">
        <h2 class="big-title" data-i18n="projects.title">Proyectos.</h2>
        <div class="filters" id="filters"></div>
        <div class="grid-projects" id="projectGrid"></div>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="view view-contact" id="contact">
      <div class="contact-inner">
        <h2 class="big-title" data-i18n="contact.title">Contacto.</h2>
        <p class="contact-lead" id="contactLead"></p>
        <button class="email-pill" id="emailPill">
          <span class="email-text"></span>
          <span class="email-copy" data-i18n="contact.copy">copiar</span>
        </button>
        <div class="socials" id="contactSocials"></div>
        <p class="contact-loc" id="contactLoc"></p>
      </div>
    </section>
  </main>

  <!-- ===== Project detail drawer ===== -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <button class="drawer-close" id="drawerClose">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7"><polyline points="15,4 7,12 15,20"></polyline></svg>
      <span data-i18n="drawer.back">Volver a proyectos</span>
    </button>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-foot" id="drawerFoot"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
